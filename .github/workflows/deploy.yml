name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run tests
        run: npm test

  eas-build:
    name: Build with Expo EAS
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g eas-cli

      - name: Validate EAS project
        run: eas --version

      - name: Build status
        run: |
          echo "✓ Ready for Expo EAS production build"
          echo "Build will be triggered via EAS CLI or web dashboard"
          echo "Configure EAS secrets in GitHub Actions settings"

  notify:
    name: Deployment Ready
    runs-on: ubuntu-latest
    needs: [eas-build]
    steps:
      - name: Post deployment status
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state: 'success',
              description: 'Ready for Expo EAS production build',
              context: 'continuous-integration/deployment-ready'
            });
