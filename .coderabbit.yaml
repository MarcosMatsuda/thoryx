reviews:
  # Enable automatic reviews
  auto_review_enabled: true

  # Trigger auto-reviews on these branches
  base_branches:
    - develop
    - develop_sprint-*
    - main

  # Review settings
  review_comment_lgtm: true # Submit official GitHub review (APPROVED or CHANGES_REQUESTED)
  fail_review_on_blocker: true # Mark as CHANGES_REQUESTED if critical issues found

  # What to review
  path_instructions:
    - path: "src/**"
      instructions: "Review code quality, security, and adherence to Clean Architecture patterns"
    - path: "**/*.test.ts"
      instructions: "Review test coverage, edge cases, and mock setup"
    - path: "**/*.test.tsx"
      instructions: "Review React Testing Library tests, accessibility, and user interactions"
